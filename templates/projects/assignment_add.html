{% extends "base.html" %}

{% block title %}إضافة موظف للمشروع - {{ project.name }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4>إضافة موظف للمشروع: {{ project.name }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="employee_id" class="form-label">الموظف *</label>
                                    <select class="form-select" id="employee_id" name="employee_id" required>
                                        <option value="">اختر موظف</option>
                                        {% for employee in employees %}
                                        <option value="{{ employee.id }}">{{ employee.name }} - {{ employee.employee_id }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="role" class="form-label">الدور *</label>
                                    <select class="form-select" id="role" name="role" required>
                                        <option value="">اختر الدور</option>
                                        {% for role in roles %}
                                        <option value="{{ role.value }}">
                                            {% if role.value == 'PROJECT_MANAGER' %}
                                                مسؤول مشروع
                                            {% elif role.value == 'HANDLER' %}
                                                سائس
                                            {% elif role.value == 'TRAINER' %}
                                                مدرب
                                            {% elif role.value == 'VET' %}
                                                طبيب
                                            {% endif %}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="period" class="form-label">الفترة *</label>
                                    <select class="form-select" id="period" name="period" required>
                                        <option value="">اختر الفترة</option>
                                        {% for period in periods %}
                                        <option value="{{ period.value }}">
                                            {% if period.value == 'MORNING' %}
                                                صباحي
                                            {% elif period.value == 'EVENING' %}
                                                مسائي
                                            {% elif period.value == 'NIGHT' %}
                                                ليلي
                                            {% endif %}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="leave_type" class="form-label">نوع الإجازة (اختياري)</label>
                                    <select class="form-select" id="leave_type" name="leave_type">
                                        <option value="">لا يوجد إجازة</option>
                                        {% for leave in leave_types %}
                                        <option value="{{ leave.value }}">
                                            {% if leave.value == 'ANNUAL' %}
                                                إجازة سنوية
                                            {% elif leave.value == 'OFFICIAL' %}
                                                إجازة رسمية
                                            {% elif leave.value == 'EMERGENCY' %}
                                                إجازة طارئة
                                            {% endif %}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('main.project_assignments', project_id=project.id) }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-right"></i> إلغاء
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> حفظ التعيين
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
